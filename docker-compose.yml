services:
  postgres-db:
    image: postgres:latest
    container_name: postgres-db
    environment:
      POSTGRES_DB: jackson_db
      POSTGRES_USER: daniel
      POSTGRES_PASSWORD: root1234
    ports:
      - "5432:5432"
    networks:
      - jackson-network
    volumes:
      - postgres_data:var/lib/postgresql/data

  jackson-api:
    container_name: jackson-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/jackson_db
      SPRING_DATASOURCE_USERNAME: daniel
      SPRING_DATASOURCE_PASSWORD: root1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
    networks:
      - jackson-network
    depends_on:
      postgres-db:
        condition: service_started

networks:
  jackson-network:
    driver: bridge

volumes:
  postgres_data: