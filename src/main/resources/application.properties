#APP
spring.application.name=JacksonApi
server.servlet.context-path=/api/v1

#BASE DE DATOS
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#VIRTUAL THREADS
spring.threads.virtual.enabled=true

#REDIS
spring.data.redis.port=6379
spring.data.redis.host=spring-redis
spring.cache.type=redis

#STRIPE
stripe.api-key=${STRIPE_API_KEY}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:8080/api/v1/payment/success?session_id={CHECKOUT_SESSION_ID}}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:8080/api/v1/payment/cancel}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

#JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#TIMEZONE
spring.jackson.time-zone=America/Lima

#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


#JWT CONFIG
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

#CORS CONFIG
cors.frontend=${CORS_FRONTEND_URL:http://localhost:4200}

#MULTIPART
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

#CLOUDINARY CONFIG
CLOUDINARY_URL=${CLOUDINARY_URL}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
CLOUDINARY_NAME=${CLOUDINARY_NAME}