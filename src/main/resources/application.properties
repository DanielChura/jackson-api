#APP
spring.application.name=JacksonApi
#server.port=????

#BASE DE DATOS
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#VIRTUAL THREADS
spring.threads.virtual.enabled=true

#REDIS
spring.data.redis.port=6379
spring.data.redis.host=spring-redis
spring.cache.type=redis

#STRIPE
stripe.api-key=${STRIPE_API_KEY}
stripe.success-url=http://localhost:8080/payment/success?session_id={CHECKOUT_SESSION_ID}
stripe.cancel-url=http://localhost:8080/payment/cancel
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

#JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


#JWT CONFIG
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}