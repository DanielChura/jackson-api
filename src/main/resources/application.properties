#APP
spring.application.name=JacksonApi
#server.port=????

#BASE DE DATOS
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#STRIPE
stripe.api-key=JacksonApiSecretKey2026SuperSeguraCambiarEnProduccion
stripe.success-url=http://localhost:8080/payment/success?session_id={CHECKOUT_SESSION_ID}
stripe.cancel-url=http://localhost:8080/payment/cancel
stripe.webhook-secret=whsec_tu_secreto_de_webhook_aqui

#JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


#JWT CONFIG
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}